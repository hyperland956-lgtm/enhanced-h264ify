<!DOCTYPE html>
<html>
   <head>
      <title data-l10n-id="optionsTitle"></title>
      <style>
        :root {
          color-scheme: light dark;
          --bg: #f3f9ff;
          --text: #11223a;
          --card: rgba(255, 255, 255, 0.8);
          --border: rgba(17, 34, 58, 0.15);
          --accent: #2d7ff9;
          --muted: #55708f;
        }

        @media (prefers-color-scheme: dark) {
          :root {
            --bg: #0f1725;
            --text: #ecf5ff;
            --card: rgba(19, 31, 50, 0.88);
            --border: rgba(236, 245, 255, 0.14);
            --accent: #74b3ff;
            --muted: #a8c1dd;
          }
        }

        * { box-sizing: border-box; }
        body {
          margin: 0;
          min-width: 360px;
          font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
          color: var(--text);
          background: radial-gradient(circle at 0 0, #cde5ff 0, transparent 45%),
                      radial-gradient(circle at 100% 100%, #dafee8 0, transparent 50%),
                      var(--bg);
        }
        .shell { padding: 14px; }
        .hero {
          border: 1px solid var(--border);
          background: var(--card);
          backdrop-filter: blur(4px);
          border-radius: 14px;
          padding: 12px;
          margin-bottom: 12px;
        }
        h1 {
          font-size: 1.1rem;
          margin: 0;
          display: flex;
          align-items: center;
          gap: 8px;
        }
        .subtitle {
          margin: 6px 0 0;
          color: var(--muted);
          font-size: 0.85rem;
        }
        .section {
          border: 1px solid var(--border);
          border-radius: 12px;
          background: var(--card);
          margin-bottom: 10px;
          padding: 8px 10px;
        }
        h2 {
          margin: 2px 0 6px;
          font-size: 0.9rem;
          color: var(--accent);
          text-transform: uppercase;
          letter-spacing: .04em;
        }
        ul { list-style: none; margin: 0; padding: 0; }
        li {
          display: flex;
          align-items: center;
          gap: 8px;
          padding: 5px 2px;
        }
        input.checkbox {
          inline-size: 17px;
          block-size: 17px;
          accent-color: var(--accent);
        }
        label { font-size: 0.92rem; }
      </style>
   </head>
   <body>
      <div class="shell">
         <section class="hero">
            <h1>ðŸŒ´ <span data-l10n-id="optionsTitle"></span></h1>
            <p class="subtitle" data-l10n-id="optionsSubtitle"></p>
         </section>

         <section class="section">
            <h2 data-l10n-id="optionsTitleVideo"></h2>
            <ul>
               <li><input type="checkbox" id="block_60fps" class="checkbox"><label for="block_60fps" data-l10n-id="optionsBlock60fps"></label></li>
               <li><input type="checkbox" id="block_50fps" class="checkbox"><label for="block_50fps" data-l10n-id="optionsBlock50fps"></label></li>
               <li><input type="checkbox" id="block_h264" class="checkbox"><label for="block_h264" data-l10n-id="optionsBlockH264"></label></li>
               <li><input type="checkbox" id="block_vp8" class="checkbox"><label for="block_vp8" data-l10n-id="optionsBlockVP8"></label></li>
               <li><input type="checkbox" id="block_vp9" class="checkbox"><label for="block_vp9" data-l10n-id="optionsBlockVP9"></label></li>
               <li><input type="checkbox" id="block_av1" class="checkbox"><label for="block_av1" data-l10n-id="optionsBlockAV1"></label></li>
            </ul>
         </section>

         <section class="section">
            <h2 data-l10n-id="optionsTitleAudio"></h2>
            <ul>
               <li><input type="checkbox" id="block_opus" class="checkbox"><label for="block_opus" data-l10n-id="optionsBlockOpus"></label></li>
               <li><input type="checkbox" id="block_mp4a" class="checkbox"><label for="block_mp4a" data-l10n-id="optionsBlockMP4A"></label></li>
               <li><input type="checkbox" id="disable_LN" class="checkbox"><label for="disable_LN" data-l10n-id="optionsDisableLN"></label></li>
            </ul>
         </section>

         <section class="section">
            <h2 data-l10n-id="optionsTitleFocus"></h2>
            <ul>
               <li><input type="checkbox" id="block_distractions" class="checkbox"><label for="block_distractions" data-l10n-id="optionsBlockDistractions"></label></li>
            </ul>
         </section>
      </div>
      <script src="options.js"></script>
   </body>
</html>
